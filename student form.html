<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration Form</title>

</head>

<body>

<!-- Header -->

<table width="100%">

<tr>

<td width="120">

<img src="logo.png" alt="Logo" width="100">

</td>

<td align="center">

<h1 style="margin:0;">

Fazaia College of Education for Women, Peshawar

</h1>

<h3 style="margin:8px 0;">

Affiliated with Air University, Islamabad

</h3>

<h2 style="margin-top:15px;">

STUDENT REGISTRATION FORM

</h2>

</td>

<td width="120"></td>

</tr>

</table>

<hr>

<!-- Registration Form -->

<table border="1" cellpadding="10" cellspacing="0" align="center">

<tr>

<td><b>Student Name</b></td>

<td><input type="text" size="30"></td>

</tr>

<tr>

<td><b>Father Name</b></td>

<td><input type="text" size="30"></td>

</tr>

<tr>

<td><b>CNIC / B-Form No</b></td>

<td><input type="text" size="30"></td>

</tr>

<tr>

<td><b>Registration No</b></td>

<td><input type="text" size="30"></td>

</tr>

<tr>

<td><b>Roll Number</b></td>

<td><input type="text" size="30"></td>

</tr>

<tr>

<td><b>Date of Birth</b></td>

<td><input type="date"></td>

</tr>

<tr>

<td><b>Gender</b></td>

<td>

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Female

</td>

</tr>

<tr>

<td><b>Email</b></td>

<td><input type="email" size="30"></td>

</tr>

<tr>

<td><b>Phone Number</b></td>

<td><input type="tel" size="30"></td>

</tr>

<tr>

<td><b>Course</b></td>

<td>

<select>

<option>BS Computer Science</option>

<option>BS English</option>

<option>B.Ed</option>

</select>

</td>

</tr>

<tr>

<td><b>Address</b></td>

<td>

<textarea rows="4" cols="32"></textarea>

</td>

</tr>

<tr>

<td colspan="2" align="center">

<input type="submit" value="Register">

<input type="reset" value="Reset">

</td>

</tr>

</table>

</body>

</html>
